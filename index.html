<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ITN Progress Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"><\/script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0e13;--bg2:#111318;--bg3:#181c24;--bg4:#1e2230;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.11);
  --text:#e6e8f0;--muted:#5a6070;--muted2:#8890a0;
  --hindi:#f5855b;--hindi-dim:rgba(245,133,91,0.12);--hindi-border:rgba(245,133,91,0.3);
  --bengali:#5b8af5;--bengali-dim:rgba(91,138,245,0.12);--bengali-border:rgba(91,138,245,0.3);
  --green:#3ecf8e;--green-dim:rgba(62,207,142,0.1);
  --yellow:#f5c842;--yellow-dim:rgba(245,200,66,0.1);
  --red:#f55b5b;--purple:#c47af5;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(91,138,245,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(91,138,245,0.025) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}
.wrap{max-width:1200px;margin:0 auto;padding:0 24px 80px;position:relative;z-index:1}
header{padding:36px 0 28px;border-bottom:1px solid var(--border);margin-bottom:32px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:24px;letter-spacing:-0.5px}
.logo .hi{color:var(--hindi)}.logo .bn{color:var(--bengali)}.logo .sep{color:var(--muted);margin:0 6px;font-size:18px}
.subtitle{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:4px}
.header-right{text-align:right}
.last-upd{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:6px}
.refresh-btn{background:transparent;border:1px solid var(--border2);border-radius:8px;color:var(--muted2);font-family:'DM Sans',sans-serif;font-size:12px;padding:6px 14px;cursor:pointer;transition:all 0.2s}
.refresh-btn:hover{color:var(--text);border-color:rgba(255,255,255,0.25)}
.proj-tabs{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px}
.proj-tab{padding:16px 20px;border-radius:14px;border:1px solid var(--border2);background:var(--bg2);cursor:pointer;transition:all 0.2s;text-align:left}
.proj-tab:hover{background:var(--bg3)}
.proj-tab.active.hindi{border-color:var(--hindi-border);background:var(--hindi-dim)}
.proj-tab.active.bengali{border-color:var(--bengali-border);background:var(--bengali-dim)}
.pt-label{font-size:10px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:5px}
.proj-tab.hindi .pt-label{color:var(--hindi)}.proj-tab.bengali .pt-label{color:var(--bengali)}
.pt-name{font-family:'Syne',sans-serif;font-size:19px;font-weight:800}
.pt-count{font-size:12px;color:var(--muted);margin-top:4px;font-family:'DM Mono',monospace}
.sbar{display:none;align-items:center;gap:10px;background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:11px 16px;margin-bottom:22px;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted2)}
.sbar.show{display:flex}.sbar.err{border-color:rgba(245,91,91,0.3);color:var(--red)}.sbar.ok{border-color:rgba(62,207,142,0.3);color:var(--green)}
.spin{width:13px;height:13px;border:2px solid var(--border2);border-top-color:var(--bengali);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.ov-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:28px}
.ov-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:22px}
.ov-card.hindi{border-top:2px solid var(--hindi)}.ov-card.bengali{border-top:2px solid var(--bengali)}
.ov-title{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:14px}
.ov-card.hindi .ov-title{color:var(--hindi)}.ov-card.bengali .ov-title{color:var(--bengali)}
.ov-nums{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.ov-num-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.ov-num-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:800}
.ov-prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px;font-family:'DM Mono',monospace}
.ov-prog-track{height:5px;background:var(--bg3);border-radius:99px;overflow:hidden}
.ov-prog-fill{height:100%;border-radius:99px;transition:width 1s cubic-bezier(0.16,1,0.3,1)}
.ov-card.hindi .ov-prog-fill{background:var(--hindi)}.ov-card.bengali .ov-prog-fill{background:var(--bengali)}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:22px}
.metric{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px 18px}
.metric-label{font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
.metric-val{font-family:'Syne',sans-serif;font-size:28px;font-weight:800}
.sec-tabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.stab{padding:6px 16px;border-radius:99px;font-size:13px;cursor:pointer;border:1px solid var(--border2);color:var(--muted2);background:transparent;font-family:'DM Sans',sans-serif;transition:all 0.18s}
.stab:hover{color:var(--text)}
.stab.active{color:#fff;border-color:transparent;font-weight:500}
.stab.active.c-hindi{background:var(--hindi)}.stab.active.c-bengali{background:var(--bengali)}
.panel{display:none;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:22px}
.panel.show{display:block;animation:fadeUp 0.3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.panel-title{font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:18px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.bar-name{font-size:13px;width:165px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:var(--bg3);border-radius:5px;height:18px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;transition:width 0.8s cubic-bezier(0.16,1,0.3,1)}
.bar-num{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted2);width:36px;text-align:right;flex-shrink:0}
.bar-pct{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);width:42px;text-align:right;flex-shrink:0}
.cross-scroll{overflow-x:auto}
.ctbl{border-collapse:collapse;font-size:12px;min-width:100%}
.ctbl th{background:var(--bg3);color:var(--muted);font-weight:500;font-family:'DM Mono',monospace;font-size:10px;padding:7px 10px;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap}
.ctbl th.lft{text-align:left}
.ctbl td{padding:6px 10px;text-align:center;border-bottom:1px solid var(--border);color:var(--text)}
.ctbl td.lft{text-align:left;font-weight:500;white-space:nowrap}
.ctbl tr:last-child td{font-weight:600;background:var(--bg3);color:var(--muted2)}
.ctbl tr:hover td{background:rgba(255,255,255,0.015)}
.hcell{display:inline-block;min-width:30px;padding:2px 7px;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px}
.s3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.s3c{border-radius:11px;padding:15px 16px;border:1px solid}
.s3c.done{background:var(--green-dim);border-color:rgba(62,207,142,0.2)}
.s3c.pending{background:var(--yellow-dim);border-color:rgba(245,200,66,0.2)}
.s3c.other{background:rgba(90,96,112,0.08);border-color:var(--border2)}
.s3label{font-size:10px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px}
.s3c.done .s3label{color:var(--green)}.s3c.pending .s3label{color:var(--yellow)}.s3c.other .s3label{color:var(--muted)}
.s3val{font-family:'Syne',sans-serif;font-size:26px;font-weight:800}
.s3sub{font-size:11px;margin-top:3px;font-family:'DM Mono',monospace}
.s3c.done .s3sub{color:var(--green)}.s3c.pending .s3sub{color:var(--yellow)}.s3c.other .s3sub{color:var(--muted)}
.cl{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.cl-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--muted2)}
.cl-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.empty{text-align:center;padding:30px;color:var(--muted);font-family:'DM Mono',monospace;font-size:13px}
footer{margin-top:48px;padding-top:18px;border-top:1px solid var(--border);text-align:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
@media(max-width:680px){
  .ov-row,.proj-tabs{grid-template-columns:1fr}
  .metrics{grid-template-columns:repeat(2,1fr)}
  .s3{grid-template-columns:1fr}
  .bar-name{width:110px}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="logo"><span class="hi">Hindi</span><span class="sep">&</span><span class="bn">Bengali</span> ITN Tracker</div>
      <div class="subtitle">// live progress dashboard · auto-discovers all user tabs</div>
    </div>
    <div class="header-right">
      <div class="last-upd" id="last-upd">Loading...</div>
      <button class="refresh-btn" onclick="loadAll()">&#8635; Refresh</button>
    </div>
  </header>

  <div class="proj-tabs">
    <div class="proj-tab hindi active" onclick="switchProj('hindi',this)">
      <div class="pt-label">Project 01 &middot; Hindi</div>
      <div class="pt-name">Hindi Collection</div>
      <div class="pt-count" id="hindi-count">Loading...</div>
    </div>
    <div class="proj-tab bengali" onclick="switchProj('bengali',this)">
      <div class="pt-label">Project 02 &middot; Bengali</div>
      <div class="pt-name">Bengali Collection</div>
      <div class="pt-count" id="bengali-count">Loading...</div>
    </div>
  </div>

  <div class="sbar" id="sbar"><div class="spin" id="spin"></div><span id="sbar-txt">Loading...</span></div>

  <div class="ov-row">
    <div class="ov-card hindi">
      <div class="ov-title">Hindi Collection</div>
      <div class="ov-nums">
        <div><div class="ov-num-label">Utterances</div><div class="ov-num-val" id="h-total">&#8212;</div></div>
        <div><div class="ov-num-label">Users</div><div class="ov-num-val" id="h-users">&#8212;</div></div>
        <div><div class="ov-num-label">Done</div><div class="ov-num-val" id="h-done" style="color:var(--green)">&#8212;</div></div>
      </div>
      <div class="ov-prog-label"><span>Completion</span><span id="h-pct">0%</span></div>
      <div class="ov-prog-track"><div class="ov-prog-fill" id="h-bar" style="width:0%"></div></div>
    </div>
    <div class="ov-card bengali">
      <div class="ov-title">Bengali Collection</div>
      <div class="ov-nums">
        <div><div class="ov-num-label">Utterances</div><div class="ov-num-val" id="b-total">&#8212;</div></div>
        <div><div class="ov-num-label">Users</div><div class="ov-num-val" id="b-users">&#8212;</div></div>
        <div><div class="ov-num-label">Done</div><div class="ov-num-val" id="b-done" style="color:var(--green)">&#8212;</div></div>
      </div>
      <div class="ov-prog-label"><span>Completion</span><span id="b-pct">0%</span></div>
      <div class="ov-prog-track"><div class="ov-prog-fill" id="b-bar" style="width:0%"></div></div>
    </div>
  </div>

  <div class="metrics" id="metrics"></div>
  <div class="sec-tabs">
    <button class="stab active" onclick="switchTab('user',this)">By user</button>
    <button class="stab" onclick="switchTab('cat',this)">By category</button>
    <button class="stab" onclick="switchTab('cross',this)">User x category</button>
    <button class="stab" onclick="switchTab('chart',this)">Chart</button>
    <button class="stab" onclick="switchTab('status',this)">Status</button>
  </div>
  <div class="panel show" id="tab-user"><div class="panel-title">Utterances per user</div><div id="user-bars"></div></div>
  <div class="panel" id="tab-cat"><div class="panel-title">Utterances per category</div><div id="cat-bars"></div></div>
  <div class="panel" id="tab-cross"><div class="panel-title">User x category breakdown</div><div class="cross-scroll"><table class="ctbl" id="ctbl"></table></div></div>
  <div class="panel" id="tab-chart">
    <div class="panel-title">Contribution chart</div>
    <div class="cl" id="cl"></div>
    <div style="position:relative;width:100%" id="chart-wrap"><canvas id="main-chart"></canvas></div>
  </div>
  <div class="panel" id="tab-status">
    <div class="panel-title">Status overview</div>
    <div class="s3" id="s3"></div>
    <div id="status-bars"></div>
  </div>

  <footer>ITN Progress Dashboard &middot; Hindi &amp; Bengali &middot; auto-refreshes every 5 min</footer>
</div>
<script>
// =============================================================================
// CONFIG — only the two Sheet IDs live here. Nothing else needs editing.
// New contributor tabs are discovered automatically at runtime.
// =============================================================================
const CFG = {
  hindi:   { id: '13Jg6Dg8Gb-hJElOKOjd_1_eEuskRIk6mNmS-VakQSSY', color: '#f5855b', rgb: '245,133,91' },
  bengali: { id: '1smZPZGrkab1qOEJryQQ3DXYx7pCy74X7_Kz67qZYnKY',  color: '#5b8af5', rgb: '91,138,245' }
};

// Tabs to always ignore (system/admin sheets)
const SKIP = new Set([
  'sample','blank','blank2','blank 2','users','combined',
  'pivot summary','checklist','instructions','readme','sheet1','sheet2','sheet3'
]);

// Name aliases — if a tab has a short/alternate name, map it to the canonical name.
// Add entries here if a person has more than one tab in future.
const NAME_MAP = {
  'lalwani': 'Ashok Lalwani'
};
function normalizeName(n) {
  const t = n.trim();
  return NAME_MAP[t.toLowerCase()] || t;
}

const PAL = ['#f5855b','#5b8af5','#3ecf8e','#c47af5','#f5c842','#5be8f5',
             '#f55b8e','#8ef55b','#f5a65b','#5bf5c4','#a65bf5','#f55b5b','#c4f55b','#5bf5a6'];

let DATA = { hindi: null, bengali: null };
let AP = 'hindi', CI = null;

// =============================================================================
// FETCH HELPERS
// =============================================================================

function cb() { return '&_=' + Date.now(); }   // cache-buster

async function tryFetch(url) {
  const u = url + (url.includes('?') ? '' : '?x=1') + cb();
  const tries = [
    u,
    'https://corsproxy.io/?' + encodeURIComponent(u),
    'https://api.allorigins.win/raw?url=' + encodeURIComponent(u)
  ];
  for (const t of tries) {
    try {
      const r = await fetch(t, { cache: 'no-store' });
      if (r.ok) { const tx = await r.text(); if (tx.length > 20) return tx; }
    } catch(e) {}
  }
  return null;
}

function parseCSV(t) {
  return t.trim().split('\n').map(line => {
    const c = []; let cur = '', q = false;
    for (const ch of line) {
      if (ch === '"') q = !q;
      else if (ch === ',' && !q) { c.push(cur.trim()); cur = ''; }
      else cur += ch;
    }
    c.push(cur.trim()); return c;
  });
}

function dcol(h, kws) {
  for (const k of kws) { const i = h.findIndex(x => x.includes(k)); if (i >= 0) return i; }
  return -1;
}

function parseRows(rows, name) {
  if (!rows || rows.length < 2) return [];
  const h  = rows[0].map(x => x.toLowerCase().trim());
  const ci = dcol(h, ['itn','category']);
  const ui = dcol(h, ['utterance']);
  const si = dcol(h, ['status']);
  const pi = dcol(h, ['person','name','user']);
  const out = [];
  for (let r = 1; r < rows.length; r++) {
    const row = rows[r];
    const utt = (row[ui >= 0 ? ui : 3] || '').trim();
    if (!utt || utt === '0' || utt.toLowerCase() === 'nan') continue;
    const cat = (row[ci >= 0 ? ci : 1] || '').trim();
    if (!cat || cat.toLowerCase() === 'itn category') continue;
    const rawName = name || (pi >= 0 ? (row[pi] || 'Unknown').trim() : 'Unknown');
    out.push({
      person: normalizeName(rawName),
      cat,
      status: si >= 0 ? (row[si] || '').trim().toLowerCase() : ''
    });
  }
  return out;
}

function crunch(rows) {
  const pm = {}, cm = {}, xm = {}, sp = {};
  let done = 0, pending = 0, other = 0;
  rows.forEach(r => {
    pm[r.person] = (pm[r.person] || 0) + 1;
    cm[r.cat]    = (cm[r.cat]    || 0) + 1;
    if (!xm[r.person]) xm[r.person] = {};
    xm[r.person][r.cat] = (xm[r.person][r.cat] || 0) + 1;
    if (!sp[r.person]) sp[r.person] = { done: 0, pending: 0, other: 0, total: 0 };
    sp[r.person].total++;
    if      (r.status === 'done')    { done++;    sp[r.person].done++;    }
    else if (r.status === 'pending') { pending++; sp[r.person].pending++; }
    else                             { other++;   sp[r.person].other++;   }
  });
  return {
    rows, done, pending, other,
    statusByPerson: sp,
    cross: xm,
    persons: Object.entries(pm).sort((a, b) => b[1] - a[1]),
    cats:    Object.entries(cm).sort((a, b) => b[1] - a[1])
  };
}

// =============================================================================
// AUTO-DISCOVER ALL TABS  (the key piece — no hardcoded tab names needed)
// Uses the Google Sheets JSON feed which reliably lists every sheet tab.
// =============================================================================
async function discoverTabs(sheetId) {
  // Method 1: Sheets JSON feed — most reliable, returns all tab names + gids
  const feedUrl = 'https://spreadsheets.google.com/feeds/worksheets/' + sheetId + '/public/basic?alt=json';
  const txt = await tryFetch(feedUrl);
  if (txt) {
    try {
      const json = JSON.parse(txt);
      const entries = json.feed.entry || [];
      const tabs = [];
      entries.forEach(e => {
        const name = e.title['$t'].trim();
        if (SKIP.has(name.toLowerCase())) return;
        // Extract gid from the self link
        const link = (e.link || []).find(l => l.rel === 'self');
        if (link) {
          const parts = link.href.split('/');
          tabs.push({ name, gid: parts[parts.length - 1] });
        }
      });
      if (tabs.length > 0) return tabs;
    } catch(e) {}
  }

  // Method 2: HTML page scraping fallback
  const html = await tryFetch('https://docs.google.com/spreadsheets/d/' + sheetId + '/edit');
  if (html) {
    const tabs = [];
    const seen = new Set();
    // Pattern: "gid":"name" pairs
    const re = /"(\d{5,})"[^}]{0,200}"name":"([^"]+)"/g;
    let m;
    while ((m = re.exec(html)) !== null) {
      const name = m[2].trim();
      if (!SKIP.has(name.toLowerCase()) && !seen.has(name)) {
        seen.add(name);
        tabs.push({ gid: m[1], name });
      }
    }
    if (tabs.length > 0) return tabs;
  }

  return [];
}

// =============================================================================
// LOAD PROJECT
// =============================================================================
async function loadProject(key) {
  const cfg = CFG[key];
  const countEl = document.getElementById(key === 'hindi' ? 'hindi-count' : 'bengali-count');
  const allRows = [];

  setSbar('Discovering tabs for ' + key + '...', 'info');

  const tabs = await discoverTabs(cfg.id);

  if (tabs.length > 0) {
    setSbar('Loading ' + tabs.length + ' tabs for ' + key + '...', 'info');
    for (const tab of tabs) {
      // Try gid-based export first, then gviz by name
      let txt = await tryFetch(
        'https://docs.google.com/spreadsheets/d/' + cfg.id + '/export?format=csv&gid=' + tab.gid
      );
      if (!txt) {
        txt = await tryFetch(
          'https://docs.google.com/spreadsheets/d/' + cfg.id + '/gviz/tq?tqx=out:csv&sheet=' + encodeURIComponent(tab.name)
        );
      }
      if (txt) allRows.push(...parseRows(parseCSV(txt), tab.name));
    }
  }

  // Last resort: fetch default sheet
  if (allRows.length === 0) {
    setSbar('Trying default sheet for ' + key + '...', 'info');
    const txt = await tryFetch('https://docs.google.com/spreadsheets/d/' + cfg.id + '/export?format=csv');
    if (txt) allRows.push(...parseRows(parseCSV(txt), null));
  }

  if (allRows.length > 0) {
    DATA[key] = crunch(allRows);
    const tot = DATA[key].rows.length;
    countEl.textContent = tot + ' utterances · ' + DATA[key].persons.length + ' users · live';
  } else {
    DATA[key] = { rows:[], persons:[], cats:[], cross:{}, done:0, pending:0, other:0, statusByPerson:{} };
    countEl.textContent = 'Could not load — check sheet is public';
  }
}

// =============================================================================
// LOAD ALL
// =============================================================================
async function loadAll() {
  setSbar('Fetching data from Google Sheets...', 'info');
  await Promise.all([loadProject('hindi'), loadProject('bengali')]);
  hideBar();
  const now = new Date();
  document.getElementById('last-upd').textContent =
    'Updated: ' + now.toLocaleDateString() + ' ' + now.toLocaleTimeString();
  renderOverview();
  renderDetail(AP);
}

// =============================================================================
// RENDER
// =============================================================================
function renderOverview() {
  ['hindi','bengali'].forEach(key => {
    const d = DATA[key]; if (!d) return;
    const px = key === 'hindi' ? 'h' : 'b';
    const total = d.rows ? d.rows.length : d.persons.reduce((s,p) => s+p[1], 0);
    const pct   = total ? Math.round(((d.done||0) / total) * 100) : 0;
    document.getElementById(px+'-total').textContent = total;
    document.getElementById(px+'-users').textContent = d.persons.length;
    document.getElementById(px+'-done').textContent  = d.done || 0;
    document.getElementById(px+'-pct').textContent   = pct + '%';
    setTimeout(() => { document.getElementById(px+'-bar').style.width = pct + '%'; }, 100);
  });
}

function renderDetail(key) {
  const d = DATA[key]; if (!d) return;
  const c = CFG[key].color, cr = CFG[key].rgb;
  const total = d.rows ? d.rows.length : d.persons.reduce((s,p) => s+p[1], 0);
  const avg   = d.persons.length ? (total / d.persons.length).toFixed(1) : '0';
  document.querySelectorAll('.stab').forEach(t => {
    t.classList.remove('c-hindi','c-bengali');
    if (t.classList.contains('active')) t.classList.add('c-' + key);
  });
  document.getElementById('metrics').innerHTML =
    '<div class="metric"><div class="metric-label">Total utterances</div><div class="metric-val" style="color:'+c+'">'+total+'</div></div>' +
    '<div class="metric"><div class="metric-label">Users</div><div class="metric-val" style="color:'+c+'">'+d.persons.length+'</div></div>' +
    '<div class="metric"><div class="metric-label">Categories</div><div class="metric-val" style="color:'+c+'">'+d.cats.length+'</div></div>' +
    '<div class="metric"><div class="metric-label">Avg / user</div><div class="metric-val" style="color:'+c+'">'+avg+'</div></div>';
  renderBars('user-bars', d.persons, total, PAL);
  renderBars('cat-bars',  d.cats,    total, c);
  renderCross(d, cr);
  renderChart(d);
  renderStatus(d, key);
}

function renderBars(id, items, total, colors) {
  const el = document.getElementById(id);
  if (!items.length) { el.innerHTML = '<div class="empty">No data</div>'; return; }
  const max = items[0][1];
  el.innerHTML = items.map(([name, count], i) => {
    const pct  = Math.round((count / max) * 100);
    const tpct = total ? ((count / total) * 100).toFixed(1) : '0';
    const col  = Array.isArray(colors) ? colors[i % colors.length] : colors;
    return '<div class="bar-row">' +
      '<div class="bar-name" title="'+name+'">'+name+'</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:0%;background:'+col+'" data-w="'+pct+'"></div></div>' +
      '<div class="bar-num">'+count+'</div><div class="bar-pct">'+tpct+'%</div></div>';
  }).join('');
  setTimeout(() => {
    el.querySelectorAll('.bar-fill').forEach(b => b.style.width = b.dataset.w + '%');
  }, 50);
}

function renderCross(d, cr) {
  const { persons, cats, cross } = d;
  const catNames = cats.map(c => c[0]);
  const maxCell  = Math.max(1, ...persons.flatMap(([p]) => catNames.map(c => (cross[p] && cross[p][c]) || 0)));
  let html = '<thead><tr><th class="lft">User</th>' + catNames.map(c => '<th>'+c+'</th>').join('') + '<th>Total</th></tr></thead><tbody>';
  persons.forEach(([p, tot]) => {
    html += '<tr><td class="lft">'+p+'</td>';
    catNames.forEach(c => {
      const v = (cross[p] && cross[p][c]) || 0;
      const a = v === 0 ? 0.04 : (0.08 + (v / maxCell) * 0.55).toFixed(2);
      html += '<td><span class="hcell" style="background:rgba('+cr+','+a+')">'+v+'</span></td>';
    });
    html += '<td>'+tot+'</td></tr>';
  });
  html += '<tr><td class="lft">Total</td>' +
    catNames.map(c => { const f = cats.find(x => x[0]===c); return '<td>'+(f?f[1]:0)+'</td>'; }).join('') +
    '<td>'+persons.reduce((s,p) => s+p[1], 0)+'</td></tr></tbody>';
  document.getElementById('ctbl').innerHTML = html;
}

function renderChart(d) {
  if (CI) { CI.destroy(); CI = null; }
  const labels = d.persons.map(p => p[0]);
  const values = d.persons.map(p => p[1]);
  const colors = labels.map((_, i) => PAL[i % PAL.length]);
  const h = Math.max(280, d.persons.length * 42 + 60);
  document.getElementById('chart-wrap').style.height = h + 'px';
  document.getElementById('cl').innerHTML = labels.map((l, i) =>
    '<div class="cl-item"><div class="cl-dot" style="background:'+colors[i]+'"></div>'+l+'</div>').join('');
  CI = new Chart(document.getElementById('main-chart'), {
    type: 'bar',
    data: { labels, datasets: [{ data: values, backgroundColor: colors, borderRadius: 5, borderSkipped: false }] },
    options: {
      responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ' ' + ctx.parsed.x + ' utterances' } } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#5a6070' } },
        y: { grid: { display: false }, ticks: { color: '#8890a0', font: { size: 12 } } }
      }
    }
  });
}

function renderStatus(d, key) {
  const total   = d.rows ? d.rows.length : d.persons.reduce((s,p) => s+p[1], 0);
  const done    = d.done    || 0;
  const pending = d.pending || 0;
  const other   = d.other !== undefined ? d.other : total;
  document.getElementById('s3').innerHTML =
    '<div class="s3c done"><div class="s3label">Done</div><div class="s3val" style="color:var(--green)">'+done+'</div><div class="s3sub">'+(total?((done/total)*100).toFixed(1):0)+'%</div></div>' +
    '<div class="s3c pending"><div class="s3label">Pending</div><div class="s3val" style="color:var(--yellow)">'+pending+'</div><div class="s3sub">'+(total?((pending/total)*100).toFixed(1):0)+'%</div></div>' +
    '<div class="s3c other"><div class="s3label">Other / blank</div><div class="s3val" style="color:var(--muted)">'+other+'</div><div class="s3sub">'+(total?((other/total)*100).toFixed(1):0)+'%</div></div>';
  const sp = d.statusByPerson || {};
  document.getElementById('status-bars').innerHTML = d.persons.map(([p, ptotal]) => {
    const s  = sp[p] || { done: 0, pending: 0, total: ptotal };
    const dp = s.total ? Math.round((s.done    / s.total) * 100) : 0;
    const pp = s.total ? Math.round((s.pending / s.total) * 100) : 0;
    return '<div class="bar-row" style="margin-bottom:10px">' +
      '<div class="bar-name" title="'+p+'">'+p+'</div>' +
      '<div style="flex:1;background:var(--bg3);border-radius:5px;height:18px;overflow:hidden;display:flex">' +
        '<div style="width:'+dp+'%;background:#3ecf8e;height:100%;transition:width 0.8s ease"></div>' +
        '<div style="width:'+pp+'%;background:#f5c842;height:100%;transition:width 0.8s ease"></div>' +
      '</div>' +
      '<div class="bar-num">'+s.done+'/'+s.total+'</div></div>';
  }).join('');
}

// =============================================================================
// UI CONTROLS
// =============================================================================
function switchProj(key, el) {
  AP = key;
  document.querySelectorAll('.proj-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderDetail(key);
}

function switchTab(name, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('show'));
  document.querySelectorAll('.stab').forEach(b => b.classList.remove('active','c-hindi','c-bengali'));
  document.getElementById('tab-' + name).classList.add('show');
  if (btn) btn.classList.add('active', 'c-' + AP);
}

function setSbar(msg, type) {
  type = type || 'info';
  document.getElementById('sbar-txt').textContent = msg;
  document.getElementById('spin').style.display = type === 'info' ? 'block' : 'none';
  document.getElementById('sbar').className = 'sbar show' + (type === 'err' ? ' err' : type === 'ok' ? ' ok' : '');
}
function hideBar() { document.getElementById('sbar').className = 'sbar'; }

// =============================================================================
// BOOT
// =============================================================================
loadAll();
setInterval(loadAll, 5 * 60 * 1000);
<\/script>
